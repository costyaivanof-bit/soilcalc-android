name: Build APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Unzip project
        run: |
          unzip -q soilcalc_android_studio_project_fixed.zip
          echo "PROJECT_DIR=soilcalc_android_project" >> $GITHUB_ENV

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: soilcalc-debug-apk
          path: soilcalc_android_project/app/build/outputs/apk/debug/*.apk
